<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calorie Tracker Pro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar card">
        <div>
          <p class="eyebrow">Nutrition</p>
          <h1>Calorie Tracker</h1>
        </div>
        <nav class="tabs" aria-label="Navigation principale">
          <button type="button" class="tab active" data-tab="today" aria-selected="true" aria-label="Aujourd'hui">🏠 Aujourd'hui</button>
          <button type="button" class="tab" data-tab="calendar" aria-selected="false" aria-label="Calendrier">🗓️ Calendrier</button>
          <button type="button" class="tab" data-tab="profile" aria-selected="false" aria-label="Profil et objectifs">👤 Profil &amp; Objectifs</button>
          <button type="button" class="tab" data-tab="history" aria-selected="false" aria-label="Historique et export">📦 Historique / Export</button>
        </nav>
        <div class="sidebar-footer">
          <label class="switch" aria-label="Activer mode sombre">
            <input id="themeToggle" type="checkbox" />
            <span>Sombre</span>
          </label>
          <button id="todayBtn" type="button" class="btn-outline">Aujourd'hui</button>
        </div>
      </aside>

      <main>
        <section class="tab-panel active" data-panel="today">
          <div class="card section-header compact-row">
            <div>
              <h2>Aujourd'hui</h2>
              <p class="muted">Vue rapide</p>
            </div>
            <div class="compact-row">
              <label class="date-field">Date
                <input id="entryDate" type="date" aria-label="Date d'entrée" />
              </label>
              <button id="openDayDetailsBtn" class="btn-outline" type="button">Voir détails</button>
            </div>
          </div>

          <div id="topAlert" class="banner"></div>

          <section class="card summary-card">
            <div id="summaryStats" class="stats-grid"></div>
            <div id="macroChart" class="macro-chart"></div>
          </section>

          <section class="card quick-add">
            <div class="compact-row">
              <h3>Ajout rapide</h3>
              <button id="toggleFavoriteEditBtn" class="btn-outline" type="button">✏️ Gérer favoris</button>
              <label>Repas
                <select id="mealType" aria-label="Type de repas">
                  <option value="breakfast">Petit-déj</option>
                  <option value="lunch">Déjeuner</option>
                  <option value="dinner">Dîner</option>
                  <option value="snacks">Collation</option>
                </select>
              </label>
            </div>
            <div class="grid add-grid">
              <label>Aliment
                <input id="foodSearch" list="foodSuggestions" type="search" placeholder="Rechercher un aliment…" aria-label="Rechercher aliment" />
              </label>
              <datalist id="foodSuggestions"></datalist>
              <label>Qté
                <input id="quantity" type="number" value="1" step="0.1" min="0.1" />
              </label>
              <label>Unité
                <select id="quantityType">
                  <option value="portion">portion(s)</option>
                  <option value="grams">g</option>
                  <option value="ml">ml</option>
                  <option value="slice">tranche(s)</option>
                  <option value="piece">pièce(s)</option>
                </select>
              </label>
            </div>
            <div id="favoriteFoods" class="favorites"></div>
            <ul id="searchResults" class="search-results"></ul>
          </section>

          <section class="card meals-card">
            <h3>Repas</h3>
            <div id="mealColumns" class="meal-columns"></div>
          </section>
        </section>

        <section class="tab-panel" data-panel="day-details">
          <section class="card">
            <div class="compact-row">
              <h2 id="dayDetailsTitle">Détails du jour</h2>
              <div class="compact-row">
                <button id="backToCalendarBtn" class="btn-outline" type="button">Retour calendrier</button>
                <button id="editTodayBtn" type="button">Éditer aujourd'hui</button>
              </div>
            </div>
            <div id="dayDetailsSummary" class="stats-grid"></div>
            <div id="dayDetailsMeals" class="day-meals"></div>
          </section>
        </section>

        <section class="tab-panel" data-panel="calendar">
          <section class="card">
            <div class="compact-row">
              <h2>Calendrier</h2>
              <div class="calendar-nav">
                <button id="prevMonth" class="btn-outline">◀</button>
                <strong id="calendarTitle"></strong>
                <button id="nextMonth" class="btn-outline">▶</button>
              </div>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </section>
        </section>

        <section class="tab-panel" data-panel="profile">
          <section class="card profile-card">
            <div class="compact-row">
              <h2>Profil</h2>
            </div>
            <div class="profile-top">
              <div class="avatar">👤</div>
              <div class="profile-actions">
                <label>Profil actif
                  <select id="profileSelect"></select>
                </label>
                <label>Nouveau profil
                  <input id="newProfileName" type="text" placeholder="Nom" maxlength="40" />
                </label>
                <button id="createProfileBtn" type="button">Créer</button>
                <button id="deleteProfileBtn" type="button" class="btn-danger">Supprimer</button>
              </div>
            </div>
            <div class="grid">
              <label>Nom
                <input id="profileName" type="text" placeholder="Nom" maxlength="40" />
              </label>
              <label>Sexe
                <select id="sex">
                  <option value="H">Homme</option>
                  <option value="F">Femme</option>
                </select>
              </label>
              <label>Âge
                <input id="age" type="number" min="10" max="100" />
              </label>
              <label>Taille
                <input id="height" type="number" min="120" max="230" />
              </label>
              <label>Poids actuel
                <input id="weight" type="number" step="0.1" min="30" max="300" />
              </label>
              <label>Activité
                <select id="activity">
                  <option value="1.2">Sédentaire</option>
                  <option value="1.375">Léger</option>
                  <option value="1.55">Modéré</option>
                  <option value="1.725">Élevé</option>
                  <option value="1.9">Athlète</option>
                </select>
              </label>
            </div>
          </section>

          <section class="card goal-card">
            <h2>Objectif</h2>
            <div class="grid">
              <label>Type
                <select id="goalType">
                  <option value="maintain">Maintien</option>
                  <option value="loss">Perte</option>
                  <option value="gain">Prise</option>
                </select>
              </label>
              <label>Déficit / Surplus
                <select id="goalDelta"></select>
              </label>
              <label>Poids cible <span class="muted" title="Estimation approx. Consultez un pro santé.">ℹ️</span>
                <input id="targetWeight" type="number" step="0.1" min="30" max="300" />
              </label>
            </div>
            <p id="goalDeltaHint" class="muted"></p>
            <div id="projectionText" class="projection"></div>
          </section>
        </section>

        <section class="tab-panel" data-panel="history">
          <section class="card export-card">
            <h2>Export</h2>
            <div class="compact-row">
              <label>Période
                <select id="exportDays">
                  <option value="30">30 j</option>
                  <option value="60">60 j</option>
                  <option value="90">90 j</option>
                </select>
              </label>
              <button id="exportBtn">CSV</button>
            </div>
            <div class="compact-row">
              <button id="backupExportBtn" type="button" class="btn-outline">Backup JSON</button>
              <label class="btn-outline file-btn">Importer JSON
                <input id="backupImportInput" type="file" accept="application/json" />
              </label>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="foods.js"></script>
    <script src="app.js"></script>
  </body>
</html>
